  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1030" cy="120" r="170" fill="#60a5fa" opacity="0.18" />
  <circle cx="180" cy="560" r="210" fill="#22d3ee" opacity="0.14" />

  <rect x="96" y="90" width="260" height="52" rx="26" fill="#0f172a" stroke="#60a5fa" stroke-width="2" />
  <text x="226" y="123" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">SOLOMYCRM</text>

